name: Deploy Next.js with rsync (single host)

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install SSH Key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          known_hosts: ${{ secrets.KNOWN_HOSTS }}
      
      - name: Prepare known_hosts
        run: |
          set -euxo pipefail

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          : > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

          ssh-keyscan -p 22 -t ed25519 -H 46.250.220.244 >> ~/.ssh/known_hosts 2>/dev/null
          ssh-keyscan -p 22 -t rsa -H 46.250.220.244 >> ~/.ssh/known_hosts 2>/dev/null
          ssh-keyscan -p 22 -t ecdsa -H 46.250.220.244 >> ~/.ssh/known_hosts 2>/dev/null

          echo "=== known_hosts ==="
          cat ~/.ssh/known_hosts

          echo "=== matching lines (ed25519) ==="
          grep -n "46\\.250\\.220\\.244" ~/.ssh/known_hosts || true
          grep -n "ed25519" ~/.ssh/known_hosts || true

          echo "=== test ssh hostkey lookup ==="
          ssh -p 22 \
            -o UserKnownHostsFile=~/.ssh/known_hosts \
            -o StrictHostKeyChecking=yes \
            -o HostKeyAlgorithms=+ssh-ed25519 \
            tnjensen@46.250.220.244 'echo SSH_OK'

      - name: Deploy files via rsync (SSH uses SERVER_HOST)
        run: |
           rsync -avzr --delete \
            --exclude='.git*' \
            --exclude='.github*' \
            --exclude='node_modules' \
            --exclude='.next' \
            -e "ssh -p 22 -o UserKnownHostsFile=~/.ssh/known_hosts -o StrictHostKeyChecking=yes" \
            ./ tnjensen@46.250.220.244:/var/www/fluidsep.com

      - name: SSH Remote Commands for PM2 (SSH uses SERVER_HOST)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            set -e
            cd "${{ secrets.DEPLOY_PATH }}"

            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"

            npm install --legacy-peer-deps
            npm run build

            export PORT=3001

            pm2 reload fluidsep-app || pm2 start npm --name "fluidsep-app" -- start
            pm2 save
