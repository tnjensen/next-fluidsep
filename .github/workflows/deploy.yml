name: Deploy Next.js to PRO ISP VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Henter koden fra GitHub
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setter opp SSH-nøkkel for rsync-overføringen
      - name: Install SSH Key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          known_hosts: ${{ secrets.KNOWN_HOSTS }}

      - name: Add host key to known_hosts (forced KEX)
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p 22 -t ed25519 \
           -o KexAlgorithms=ecdh-sha2-nistp256 \
            46.250.220.244 >> ~/.ssh/known_hosts
      # 3. Synkroniserer kildekoden til serveren (ekskluderer unødvendige filer)
      - name: Deploy files via rsync
        run: |
          rsync -avzr --delete \
            --exclude='.git*' \
            --exclude='.github*' \
            --exclude='node_modules' \
            --exclude='.next' \
            -e "ssh -p 22 -o UserKnownHostsFile=/home/runner/.ssh/known_hosts -o StrictHostKeyChecking=yes" \
            ./ tnjensen@46.250.220.244:/var/www/fluidsep.com

      # 4. Logger inn på VPS via SSH for å bygge og restarte med PM2
      - name: SSH Remote Commands for PM2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            cd /var/www/fluidsep.com

      - name: SSH Remote Commands for PM2 (build & restart)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            cd /var/www/fluidsep.com
            # Load full Node.js environment (necessary so commands exist over SSH)
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"

            # Install packages and build the app on the server
            npm install
            npm run build

            # Reload Next.js without downtime via PM2
            pm2 reload fluidsep-app || pm2 start npm --name "fluidsep-app" -- start
            pm2 save
